name: CI/CD Backend Willy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---- Étape 1 : validation (bloque le déploiement si elle échoue) ----
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm db:generate

      - name: Lint
        run: pnpm exec eslint .

      - name: Build (tsc)
        run: pnpm build

  # ---- Étape 2 : déploiement VPS (seulement sur push main, pas sur PR) ----
  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'ENDSSH'
            set -e
            cd __APP_PATH__
            git pull origin main
            pnpm install --frozen-lockfile
            pnpm db:generate
            pnpm build
            # Migrations Prisma : gérées manuellement (pnpm prisma migrate deploy) — non lancées ici
            pm2 reload __PM2_NAME__ --update-env
          ENDSSH

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "pm2 describe __PM2_NAME__ | grep -E 'status|uptime'"
